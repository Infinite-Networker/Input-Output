<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="100%" style="stop-color:#302b63"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="arr2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <filter id="g2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer bg circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg2)"/>

  <!-- Decorative rings -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#acc2)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="74" fill="none" stroke="url(#acc2)" stroke-width="1" opacity="0.2"/>

  <!-- Inner panel -->
  <circle cx="100" cy="100" r="64" fill="#12103a"/>

  <!-- Input arrow -->
  <line x1="38" y1="88" x2="82" y2="88" stroke="url(#arr2)" stroke-width="5" stroke-linecap="round" filter="url(#g2)"/>
  <polygon points="82,78 100,88 82,98" fill="url(#arr2)" filter="url(#g2)"/>

  <!-- Output arrow -->
  <line x1="118" y1="112" x2="162" y2="112" stroke="url(#arr2)" stroke-width="5" stroke-linecap="round" filter="url(#g2)"/>
  <polygon points="100,102 118,112 100,122" fill="url(#arr2)" filter="url(#g2)"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="6" fill="url(#acc2)" filter="url(#g2)"/>

  <!-- IO letters -->
  <text x="100" y="158" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" letter-spacing="3"
        fill="url(#acc2)" opacity="0.9">INPUT·OUTPUT</text>
</svg>
